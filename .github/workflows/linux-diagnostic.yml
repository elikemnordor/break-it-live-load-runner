name: Linux load diagnostic

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Fixed local-only diagnostic profile
        required: true
        type: choice
        default: local-1000
        options:
          - local-1000
          - local-2500
          - staging-2500
          - staging-5000

permissions:
  contents: read

concurrency:
  group: break-it-live-linux-diagnostic
  cancel-in-progress: false

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out the private application read-only
        uses: actions/checkout@v4
        with:
          repository: elikemnordor/break-it-live
          ref: main
          path: app
          ssh-key: ${{ secrets.BREAK_IT_LIVE_DEPLOY_KEY }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Build local static assets
        if: startsWith(inputs.profile, 'local-')
        working-directory: app
        run: pnpm build:apps

      - name: Record and tune Linux socket limits
        shell: bash
        run: |
          set -euo pipefail
          soft_limit="$(ulimit -Sn)"
          hard_limit="$(ulimit -Hn)"
          target_limit=250000
          if (( hard_limit < target_limit )); then
            target_limit="${hard_limit}"
          fi
          if ! ulimit -Sn "${target_limit}"; then
            echo "Runner kept its existing file-descriptor limit."
          fi

          if ! sudo sysctl -w net.ipv4.ip_local_port_range="1024 65535"; then
            echo "Runner kept its existing ephemeral-port range."
          fi
          if ! sudo sysctl -w net.ipv4.tcp_tw_reuse=1; then
            echo "Runner kept its existing TIME_WAIT reuse setting."
          fi

          echo "file descriptors soft: $(ulimit -Sn)"
          echo "file descriptors hard: $(ulimit -Hn)"
          sysctl net.ipv4.ip_local_port_range
          sysctl net.ipv4.tcp_tw_reuse

      - name: Start the Worker locally
        if: startsWith(inputs.profile, 'local-')
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          pnpm exec wrangler dev \
            --ip 127.0.0.1 \
            --port 8787 \
            --var SHARD_COUNT:32 \
            --log-level error \
            --show-interactive-dev-session false \
            >"${RUNNER_TEMP}/break-it-live-worker.log" 2>&1 &
          echo "$!" >"${RUNNER_TEMP}/break-it-live-worker.pid"

          for attempt in $(seq 1 90); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:8787/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Local Worker did not become ready." >&2
          tail -n 200 "${RUNNER_TEMP}/break-it-live-worker.log" >&2
          exit 1

      - name: Verify the deployed staging Worker
        if: startsWith(inputs.profile, 'staging-')
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            https://break-it-live-staging.elikemnordor.workers.dev/api/health \
            >/dev/null

      - name: Run the fixed diagnostic
        id: load
        working-directory: app
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          STAGING_DISPLAY_ACCESS_CODE: ${{ secrets.STAGING_DISPLAY_ACCESS_CODE }}
          STAGING_OPERATOR_ACCESS_CODE: ${{ secrets.STAGING_OPERATOR_ACCESS_CODE }}
        run: |
          set -uo pipefail

          if [[ "${PROFILE}" == "local-1000" ]]; then
            clients=1000
            event_prefix=github-linux-local-1000
            report_name=github-linux-local-1000.json
            extra_args=()
          elif [[ "${PROFILE}" == "local-2500" ]]; then
            clients=2500
            event_prefix=github-linux-local-2500
            report_name=github-linux-local-2500.json
            extra_args=(
              --join-stages=1500,2000,2500
              --join-stage-hold=30000
            )
          elif [[ "${PROFILE}" == "staging-2500" ]]; then
            clients=2500
            event_prefix=github-linux-staging-2500
            report_name=github-linux-staging-2500.json
            export LOAD_BASE_URL="https://break-it-live-staging.elikemnordor.workers.dev"
            export LOAD_DISPLAY_ACCESS_CODE="${STAGING_DISPLAY_ACCESS_CODE}"
            export LOAD_OPERATOR_ACCESS_CODE="${STAGING_OPERATOR_ACCESS_CODE}"
            extra_args=(
              --join-stages=1500,2000,2500
              --join-stage-hold=30000
            )
          elif [[ "${PROFILE}" == "staging-5000" ]]; then
            clients=5000
            event_prefix=github-linux-staging-5000
            report_name=github-linux-staging-5000.json
            export LOAD_BASE_URL="https://break-it-live-staging.elikemnordor.workers.dev"
            export LOAD_DISPLAY_ACCESS_CODE="${STAGING_DISPLAY_ACCESS_CODE}"
            export LOAD_OPERATOR_ACCESS_CODE="${STAGING_OPERATOR_ACCESS_CODE}"
            extra_args=(
              --join-stages=2500,5000
              --join-stage-hold=30000
            )
          else
            echo "Unsupported fixed profile: ${PROFILE}" >&2
            exit 2
          fi

          report_path="loadtest/reports/${report_name}"
          event_id="${event_prefix}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          status=0

          LOAD_REPORT_PATH="${report_path}" pnpm test:load:ws -- \
            --event-id="${event_id}" \
            --clients="${clients}" \
            --shards=32 \
            --join-rate=125 \
            --join-concurrency=100 \
            --reconnect-percent=0 \
            --taps-per-client=100 \
            --taps-per-sync=25 \
            --tapping-duration=5000 \
            --countdown=1000 \
            --ack-timeout=120000 \
            "${extra_args[@]}" || status=$?

          echo "LOAD_EXIT_STATUS=${status}" >>"${GITHUB_OUTPUT}"
          echo "REPORT_PATH=${report_path}" >>"${GITHUB_OUTPUT}"
          exit "${status}"

      - name: Print the complete diagnostic evidence
        if: always()
        working-directory: app
        shell: bash
        env:
          REPORT_PATH: ${{ steps.load.outputs.REPORT_PATH }}
        run: |
          set -uo pipefail

          echo "::group::Load diagnostic report"
          if [[ -n "${REPORT_PATH}" && -f "${REPORT_PATH}" ]]; then
            node - "${REPORT_PATH}" <<'NODE'
          const { readFileSync } = require('node:fs');

          const report = JSON.parse(readFileSync(process.argv[2], 'utf8'));
          const summary = {
            runStatus: report.runStatus,
            durationMs: report.durationMs,
            scenario: report.scenario,
            connections: report.connections,
            traffic: report.traffic,
            stage: report.stage,
            control: report.control,
            health: {
              healthyShards: report.health?.healthyShards,
              expectedShards: report.health?.expectedShards,
              slowShardObservedStale: report.health?.slowShardObservedStale,
              unhealthyShards: report.health?.shards?.filter(
                (shard) => shard.status !== 'healthy',
              ),
            },
            storageOperations: report.storageOperations,
            diagnostics: {
              acknowledgementLatencyTrend:
                report.diagnostics?.acknowledgementLatencyTrend,
              errors: report.diagnostics?.errors,
              generatorHost: {
                samples: report.diagnostics?.generatorHost?.samples,
                cpuPercent: report.diagnostics?.generatorHost?.cpuPercent,
                eventLoopLagMs:
                  report.diagnostics?.generatorHost?.eventLoopLagMs,
                maxActiveConnections:
                  report.diagnostics?.generatorHost?.maxActiveConnections,
                maxOpenFileDescriptors:
                  report.diagnostics?.generatorHost?.maxOpenFileDescriptors,
                maxRssBytes:
                  report.diagnostics?.generatorHost?.maxRssBytes,
              },
              generatorNetwork: {
                baseline: report.diagnostics?.generatorNetwork?.baseline,
                collectionErrors:
                  report.diagnostics?.generatorNetwork?.collectionErrors,
                ephemeralPortRange:
                  report.diagnostics?.generatorNetwork?.ephemeralPortRange,
                final: report.diagnostics?.generatorNetwork?.final,
                peak: report.diagnostics?.generatorNetwork?.peak,
              },
              phases: report.diagnostics?.phases,
              serverHealth: {
                samples: report.diagnostics?.serverHealth?.samples,
                collectionErrors:
                  report.diagnostics?.serverHealth?.collectionErrors,
                peak: report.diagnostics?.serverHealth?.peak,
              },
            },
            errors: report.errors,
            verdict: report.verdict,
          };

          console.log(JSON.stringify(summary, null, 2));
          NODE
          else
            echo "No load report was written."
          fi
          echo "::endgroup::"

          echo "::group::Local Worker log (last 500 lines)"
          if [[ -f "${RUNNER_TEMP}/break-it-live-worker.log" ]]; then
            tail -n 500 "${RUNNER_TEMP}/break-it-live-worker.log"
          else
            echo "No Worker log was written."
          fi
          echo "::endgroup::"

      - name: Preserve the complete report for one day
        if: always() && steps.load.outputs.REPORT_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: app/${{ steps.load.outputs.REPORT_PATH }}
          if-no-files-found: warn
          retention-days: 1

      - name: Stop the local Worker
        if: always() && inputs.profile != 'staging-2500'
        shell: bash
        run: |
          if [[ -f "${RUNNER_TEMP}/break-it-live-worker.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/break-it-live-worker.pid")" || true
          fi
